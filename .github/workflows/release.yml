name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Build webview
        run: pnpm --filter pglens build:webview

      - name: Compile extension
        run: pnpm --filter pglens compile

      - name: Package extension
        run: |
          cd apps/pglens-vscode
          pnpm exec vsce package --no-dependencies

      - name: Publish to VS Code Marketplace
        run: |
          cd apps/pglens-vscode
          pnpm exec vsce publish --no-dependencies -p ${{ secrets.VSCE_TOKEN }}

      - name: Publish to Open VSX
        run: |
          cd apps/pglens-vscode
          pnpm exec ovsx publish *.vsix -p ${{ secrets.OVSX_TOKEN }}
